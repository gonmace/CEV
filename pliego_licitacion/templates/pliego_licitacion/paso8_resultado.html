{% extends 'pliego_licitacion/pasos.html' %}
{% load static crispy_forms_tags tailwind_tags %}

{% block css %}
  {{ block.super }}
  <style>
    /* Heading counter overrides para coincidir con ver_especificacion */
    .doc-body { counter-reset: seccion subseccion; }
    .doc-body :is(h2)::before { counter-increment: none; content: none; }
    .doc-body :is(h2) {
      font-size: .72rem; font-weight: 700;
      color: var(--color-base-content);
      opacity: .35;
      text-transform: uppercase; letter-spacing: .08em;
      margin-top: 2rem; margin-bottom: .1rem;
    }
    .doc-body :is(h3) { counter-reset: seccion subseccion; }
    .doc-body :is(h3)::before { counter-increment: none; content: none; }
    .doc-body :is(h3) {
      font-size: 1.05rem; font-weight: 800;
      color: #1e293b;
      margin-top: 2.5rem; margin-bottom: .5rem;
      padding-bottom: .35rem;
      border-bottom: 1px solid color-mix(in srgb, currentColor 12%, transparent);
    }
    .doc-body :is(h3):first-child { margin-top: 0; }
    .doc-body :is(h4) { counter-reset: subseccion; }
    .doc-body :is(h4)::before {
      counter-increment: seccion;
      content: counter(seccion) ".  ";
    }
    .doc-body :is(h4) {
      font-size: .95rem; font-weight: 700;
      color: #1d4ed8;
      margin-top: 1.5rem; margin-bottom: .4rem;
    }
    .doc-body :is(h5)::before {
      counter-increment: subseccion;
      content: counter(seccion) "." counter(subseccion) "  ";
    }
    .doc-body :is(h5) {
      font-size: .88rem; font-weight: 700;
      color: #1d4ed8;
      margin-top: 1.1rem; margin-bottom: .3rem;
    }
    .doc-body :is(h6)::before { counter-increment: none; content: none; }
    .doc-body :is(h6) {
      font-size: .82rem; font-weight: 600;
      color: var(--color-base-content);
      margin-top: .8rem; margin-bottom: .2rem;
    }
    [data-theme="cev-dark"] .doc-body :is(h3) { color: var(--color-base-content); }
    [data-theme="cev-dark"] .doc-body :is(h4),
    [data-theme="cev-dark"] .doc-body :is(h5) { color: #93c5fd; }
    .doc-body > :is(h1,h2,h3,h4,h5,h6):first-child { display: none; }
  </style>
{% endblock %}

{% block content %}
  {{ block.super }}
  
  <!-- Contenido del Paso 5: Resultado -->
  <div class="min-h-screen bg-base-100 py-6 px-4">
    <div class="max-w-3xl mx-auto space-y-4">

      <!-- Indicador de paso -->
      <div class="flex items-center gap-3">
        <div class="badge badge-success badge-lg w-8 h-8 rounded-full flex items-center justify-center text-white font-bold shrink-0">
          <i class="fas fa-check text-xs"></i>
        </div>
        <span class="text-sm font-semibold text-base-content/60">Especificación Técnica Generada</span>
      </div>

      <!-- Documento -->
      <div id="resultContainer" class="doc-wrap" style="display: none;">
        <div class="doc-header">
          <div class="doc-code">Especificación Técnica</div>
          <div id="result-title" class="doc-title"></div>
        </div>
        <div class="doc-body pt-0">
          <article id="response-content"></article>
        </div>
      </div>

      <!-- Barra de acciones fija -->
      <div class="action-bar rounded-xl">
        <button onclick="window.location.href='{% url 'pliego_licitacion:pasos' %}'" class="btn btn-ghost btn-sm gap-2">
          <i class="fas fa-redo"></i>
          Generar Nueva
        </button>
        <button id="btnGuardar" onclick="guardarEspecificacion()" class="btn btn-success btn-sm gap-2 btn-disabled" disabled>
          <i class="fas fa-save"></i>
          Guardar
        </button>
      </div>

    </div>
  </div>

{% endblock %}

{% block js %}
  <script>
    const btnGuardar = document.getElementById('btnGuardar');
    window.__ultimoMarkdown = null;  // Markdown original (raw)
    window.__ultimoMarkdownRaw = null;  // Markdown original garantizado

    function setGuardarEnabled(enabled) {
      if (!btnGuardar) return;
      btnGuardar.disabled = !enabled;
      btnGuardar.classList.toggle('btn-disabled', !enabled);
    }

    // Función para mostrar/ocultar el spinner (usa el spinner global ai-spinner)
    function toggleSpinner(show, text) {
      show ? (typeof showSpinner === 'function' && showSpinner(text || 'Cargando especificación...'))
           : (typeof hideSpinner === 'function' && hideSpinner());
    }

    // Función para obtener el token CSRF
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    // Función para guardar la especificación
    async function guardarEspecificacion() {
      // Usar el markdown RAW original si está disponible, si no, el servidor lo obtendrá de la BD
      const contenidoAGuardar = window.__ultimoMarkdownRaw || window.__ultimoMarkdown;
      
      if (!contenidoAGuardar && !window.especificacionTecnicaId) {
        flashy.error('No hay especificación para guardar.');
        return;
      }

      try {
        toggleSpinner(true);
        setGuardarEnabled(false);

        // Obtener proyecto_id de la URL si existe
        const urlParams = new URLSearchParams(window.location.search);
        const proyectoIdFromUrl = urlParams.get('proyecto_id');
        
        const payload = {
          especificacion_id: window.especificacionTecnicaId
        };
        
        // Solo enviar contenido si tenemos el markdown RAW original
        // Si no lo tenemos, el servidor lo obtendrá de resultado_markdown en la BD
        if (contenidoAGuardar) {
          payload.contenido = contenidoAGuardar;
        }
        
        // Agregar proyecto_id al payload si existe en la URL
        // Esto es importante porque puede que no esté en la sesión del servidor
        if (proyectoIdFromUrl) {
          payload.proyecto_id = proyectoIdFromUrl;
        }
        
        const response = await fetch('{% url "pliego_licitacion:guardar_resultado" %}', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify(payload)
        });
        
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          const text = await response.text();
          throw new Error(`Error del servidor (${response.status}): La respuesta no es JSON válido. Respuesta: ${text.substring(0, 200)}`);
        }

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || `Error del servidor (${response.status}): No se pudo guardar la especificación`);
        }

        if (!data.success) {
          throw new Error(data.error || 'No se pudo guardar la especificación');
        }

        // Redirigir a la página de éxito o mostrar mensaje
        if (data.redirect_url) {
          window.location.href = data.redirect_url;
        } else {
          // No mostrar alert, solo redirigir al inicio
          window.location.href = '{% url "pliego_licitacion:pasos" %}';
        }
      } catch (error) {
        flashy.error('Error al guardar la especificación: ' + error.message);
        setGuardarEnabled(true);
        toggleSpinner(false);
      }
    }

    // Inicializar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        toggleSpinner(true);
        
        // Obtener el ID de la especificación técnica desde múltiples fuentes
        // 1. De la URL (parámetro GET)
        const urlParams = new URLSearchParams(window.location.search);
        let especificacionId = urlParams.get('especificacion_id');
        
        // 2. De sessionStorage si no está en la URL
        if (!especificacionId) {
          especificacionId = sessionStorage.getItem('especificacionTecnicaId');
        }
        
        // 3. De la variable global si está disponible
        if (!especificacionId && window.especificacionTecnicaId) {
          especificacionId = window.especificacionTecnicaId;
        }
        
        // Si aún no tenemos el ID, mostrar error
        if (!especificacionId) {
          throw new Error('No se pudo obtener el ID de la especificación técnica. Por favor, vuelva a iniciar el proceso.');
        }
        
        // Guardar en sessionStorage y variable global para futuras referencias
        sessionStorage.setItem('especificacionTecnicaId', especificacionId);
        window.especificacionTecnicaId = especificacionId;
        
        // Actualizar el ID en el breadcrumbs si existe el elemento
        const idDisplay = document.getElementById('especificacion-id-display');
        const idValue = document.getElementById('especificacion-id-value');
        if (idDisplay && idValue) {
          idValue.textContent = especificacionId;
          idDisplay.classList.remove('hidden');
        }
        
        // Obtener el proyecto_id de la URL si existe (para mantenerlo en la sesión)
        const proyectoIdFromUrl = urlParams.get('proyecto_id');

        // Obtener el resultado desde el servidor, incluyendo proyecto_id si existe
        let url = '{% url "pliego_licitacion:resultado" %}?especificacion_id=' + especificacionId;
        if (proyectoIdFromUrl) {
          url += '&proyecto_id=' + proyectoIdFromUrl;
        }
        
        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'X-Requested-With': 'XMLHttpRequest'
          }
        });

        if (!response.ok) {
          throw new Error(`Error HTTP: ${response.status}`);
        }

        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          throw new TypeError("La respuesta no es JSON válido");
        }

        const resultado = await response.json();

        if (resultado.success && resultado.markdown_html) {
          // Mostrar el resultado
          document.getElementById('response-content').innerHTML = resultado.markdown_html;
          if (resultado.titulo) {
            document.getElementById('result-title').textContent = resultado.titulo;
          }
          document.getElementById('resultContainer').style.display = 'block';
          
          // IMPORTANTE: Guardar el markdown RAW original del POST, no el HTML
          // Prioridad: raw_markdown > (obtener de BD si no está disponible)
          if (resultado.raw_markdown) {
            window.__ultimoMarkdown = resultado.raw_markdown;
            window.__ultimoMarkdownRaw = resultado.raw_markdown;
          } else {
            window.__ultimoMarkdown = null;
            window.__ultimoMarkdownRaw = null;
          }
          
          toggleSpinner(false);
          setGuardarEnabled(true);
        } else {
          throw new Error(resultado.error || 'No se encontró el resultado de la especificación');
        }
      } catch (error) {
        toggleSpinner(false);
        flashy.error('Error al cargar el resultado: ' + error.message);
        // Redirigir al inicio si hay error
        window.location.href = '{% url "pliego_licitacion:pasos" %}';
      }
    });
  </script>
{% endblock %}
