{% extends 'pliego_licitacion/pasos.html' %}
{% load static crispy_forms_tags tailwind_tags %}

{% block content %}
  {{ block.super }}
  
  <!-- Contenido del Paso 5: Resultado -->
  <div class="flex flex-col items-center justify-center mt-6">
    <div class="card w-full max-w-5xl bg-base-100 shadow-xl">
      <div id="resultContainer" class="mt-8 mx-auto rounded-lg shadow" style="display: none;">
        <div class="p-4 rounded-md">
          <article id="response-content" class="prose prose-slate prose-lg max-w-5xl px-20 pt-6">
          </article>
        </div>
      </div>

      <!-- Botones de navegación -->
      <div class="card-actions justify-end m-6">
        <button onclick="window.location.href='{% url 'pliego_licitacion:pasos' %}'" class="btn btn-outline">
          <i class="fas fa-redo mr-2"></i>
          Generar Nueva
        </button>
        <button id="btnGuardar" onclick="guardarEspecificacion()" class="btn btn-primary btn-disabled" disabled>
          <i class="fas fa-save mr-2"></i>
          Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- Spinner de carga -->
  <div id="loadingSpinner" class="fixed inset-0 backdrop-blur-sm bg-base-300/10 flex items-center justify-center z-50" style="display: none;">
    <div class="flex flex-col items-center gap-4">
      <span class="loading loading-spinner loading-lg text-primary"></span>
      <p class="text-lg font-medium text-white">Cargando especificación...</p>
    </div>
  </div>
{% endblock %}

{% block js %}
  <script>
    const btnGuardar = document.getElementById('btnGuardar');
    window.__ultimoMarkdown = null;  // Markdown original (raw)
    window.__ultimoMarkdownRaw = null;  // Markdown original garantizado

    function setGuardarEnabled(enabled) {
      if (!btnGuardar) return;
      btnGuardar.disabled = !enabled;
      btnGuardar.classList.toggle('btn-disabled', !enabled);
    }

    // Función para mostrar/ocultar el spinner
    function toggleSpinner(show) {
      const spinner = document.getElementById('loadingSpinner');
      if (spinner) {
        spinner.style.display = show ? 'flex' : 'none';
      }
    }

    // Función para obtener el token CSRF
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    // Función para guardar la especificación
    async function guardarEspecificacion() {
      console.log('guardarEspecificacion llamada', {
        tiene_markdown_raw: !!window.__ultimoMarkdownRaw,
        tiene_markdown: !!window.__ultimoMarkdown,
        markdown_raw_length: window.__ultimoMarkdownRaw ? window.__ultimoMarkdownRaw.length : 0,
        markdown_length: window.__ultimoMarkdown ? window.__ultimoMarkdown.length : 0,
        especificacion_id: window.especificacionTecnicaId
      });
      
      // Usar el markdown RAW original si está disponible, si no, el servidor lo obtendrá de la BD
      const contenidoAGuardar = window.__ultimoMarkdownRaw || window.__ultimoMarkdown;
      
      if (!contenidoAGuardar && !window.especificacionTecnicaId) {
        alert('No hay especificación para guardar.');
        return;
      }

      try {
        toggleSpinner(true);
        setGuardarEnabled(false);

        // Obtener proyecto_id de la URL si existe
        const urlParams = new URLSearchParams(window.location.search);
        const proyectoIdFromUrl = urlParams.get('proyecto_id');
        
        const payload = {
          especificacion_id: window.especificacionTecnicaId
        };
        
        // Solo enviar contenido si tenemos el markdown RAW original
        // Si no lo tenemos, el servidor lo obtendrá de resultado_markdown en la BD
        if (contenidoAGuardar) {
          payload.contenido = contenidoAGuardar;
          console.log('✅ Enviando markdown RAW original del POST:', contenidoAGuardar.substring(0, 100) + '...');
        } else {
          console.log('⚠️ No hay markdown RAW disponible. El servidor obtendrá el contenido de la BD.');
        }
        
        // Agregar proyecto_id al payload si existe en la URL
        // Esto es importante porque puede que no esté en la sesión del servidor
        if (proyectoIdFromUrl) {
          payload.proyecto_id = proyectoIdFromUrl;
          console.log('proyecto_id agregado al payload desde URL:', proyectoIdFromUrl);
        } else {
          console.warn('⚠️ No se encontró proyecto_id en la URL. El servidor intentará obtenerlo de la sesión.');
        }
        
        console.log('Enviando payload para guardar:', {
          contenido_length: payload.contenido ? payload.contenido.length : 0,
          contenido_tipo: payload.contenido ? (payload.contenido.startsWith('<') ? 'HTML' : 'Markdown') : 'no disponible',
          especificacion_id: payload.especificacion_id,
          proyecto_id: payload.proyecto_id || 'no disponible',
          nota: payload.contenido ? 'Enviando markdown RAW original del POST' : 'El servidor obtendrá el markdown de la BD'
        });

        const response = await fetch('{% url "pliego_licitacion:guardar_resultado" %}', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify(payload)
        });
        
        console.log('Respuesta recibida:', {
          status: response.status,
          ok: response.ok,
          contentType: response.headers.get('content-type')
        });

        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          const text = await response.text();
          throw new Error(`Error del servidor (${response.status}): La respuesta no es JSON válido. Respuesta: ${text.substring(0, 200)}`);
        }

        const data = await response.json();
        console.log('Datos de respuesta:', data);
        
        if (!response.ok) {
          console.error('Error en respuesta:', data);
          throw new Error(data.error || `Error del servidor (${response.status}): No se pudo guardar la especificación`);
        }
        
        if (!data.success) {
          console.error('Respuesta sin éxito:', data);
          throw new Error(data.error || 'No se pudo guardar la especificación');
        }

        console.log('Guardado exitoso, redirect_url:', data.redirect_url);
        console.log('Respuesta completa del servidor:', data);
        
        // Redirigir a la página de éxito o mostrar mensaje
        if (data.redirect_url) {
          console.log('✅ Redirigiendo a:', data.redirect_url);
          window.location.href = data.redirect_url;
        } else {
          console.warn('⚠️ No hay redirect_url en la respuesta. Esto puede indicar que no hay proyecto_id en la sesión.');
          console.log('Datos de respuesta:', data);
          // No mostrar alert, solo redirigir al inicio
          window.location.href = '{% url "pliego_licitacion:pasos" %}';
        }
      } catch (error) {
        console.error('Error al guardar:', error);
        alert('Error al guardar la especificación: ' + error.message);
        setGuardarEnabled(true);
        toggleSpinner(false);
      }
    }

    // Inicializar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        toggleSpinner(true);
        
        // Obtener el ID de la especificación técnica desde múltiples fuentes
        // 1. De la URL (parámetro GET)
        const urlParams = new URLSearchParams(window.location.search);
        let especificacionId = urlParams.get('especificacion_id');
        
        // 2. De sessionStorage si no está en la URL
        if (!especificacionId) {
          especificacionId = sessionStorage.getItem('especificacionTecnicaId');
        }
        
        // 3. De la variable global si está disponible
        if (!especificacionId && window.especificacionTecnicaId) {
          especificacionId = window.especificacionTecnicaId;
        }
        
        // Si aún no tenemos el ID, mostrar error
        if (!especificacionId) {
          throw new Error('No se pudo obtener el ID de la especificación técnica. Por favor, vuelva a iniciar el proceso.');
        }
        
        // Guardar en sessionStorage y variable global para futuras referencias
        sessionStorage.setItem('especificacionTecnicaId', especificacionId);
        window.especificacionTecnicaId = especificacionId;
        
        // Actualizar el ID en el breadcrumbs si existe el elemento
        const idDisplay = document.getElementById('especificacion-id-display');
        const idValue = document.getElementById('especificacion-id-value');
        if (idDisplay && idValue) {
          idValue.textContent = especificacionId;
          idDisplay.classList.remove('hidden');
        }
        
        // Obtener el proyecto_id de la URL si existe (para mantenerlo en la sesión)
        const proyectoIdFromUrl = urlParams.get('proyecto_id');
        if (proyectoIdFromUrl) {
          console.log('proyecto_id encontrado en URL:', proyectoIdFromUrl);
        }
        
        // Obtener el resultado desde el servidor, incluyendo proyecto_id si existe
        let url = '{% url "pliego_licitacion:paso5_resultado" %}?especificacion_id=' + especificacionId;
        if (proyectoIdFromUrl) {
          url += '&proyecto_id=' + proyectoIdFromUrl;
        }
        
        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'X-Requested-With': 'XMLHttpRequest'
          }
        });

        if (!response.ok) {
          throw new Error(`Error HTTP: ${response.status}`);
        }

        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          throw new TypeError("La respuesta no es JSON válido");
        }

        const resultado = await response.json();
        console.log('Respuesta del servidor:', resultado);

        if (resultado.success && resultado.markdown_html) {
          // Mostrar el resultado
          document.getElementById('response-content').innerHTML = resultado.markdown_html;
          document.getElementById('resultContainer').style.display = 'block';
          
          // IMPORTANTE: Guardar el markdown RAW original del POST, no el HTML
          // Prioridad: raw_markdown > (obtener de BD si no está disponible)
          if (resultado.raw_markdown) {
            window.__ultimoMarkdown = resultado.raw_markdown;
            window.__ultimoMarkdownRaw = resultado.raw_markdown;
            console.log('✅ Markdown original (raw_markdown) guardado:', resultado.raw_markdown.substring(0, 100) + '...');
          } else {
            // Si no hay raw_markdown en la respuesta, usar el que ya está guardado en la BD
            // (que viene del POST original)
            console.warn('⚠️ No hay raw_markdown en la respuesta. Se usará el contenido guardado en la BD.');
            window.__ultimoMarkdown = null;  // Se obtendrá del servidor al guardar
            window.__ultimoMarkdownRaw = null;
          }
          
          // NO guardar automáticamente - esperar a que el usuario haga clic en "Guardar"
          console.log('Resultado cargado exitosamente. Esperando acción del usuario para guardar.', {
            especificacion_id: window.especificacionTecnicaId,
            tiene_markdown_raw: !!window.__ultimoMarkdownRaw,
            tiene_markdown: !!window.__ultimoMarkdown,
            proyecto_id: urlParams.get('proyecto_id')
          });
          
          toggleSpinner(false);
          setGuardarEnabled(true);
        } else {
          throw new Error(resultado.error || 'No se encontró el resultado de la especificación');
        }
      } catch (error) {
        console.error('Error:', error);
        toggleSpinner(false);
        alert('Error al cargar el resultado: ' + error.message);
        // Redirigir al inicio si hay error
        window.location.href = '{% url "pliego_licitacion:pasos" %}';
      }
    });
  </script>
{% endblock %}
