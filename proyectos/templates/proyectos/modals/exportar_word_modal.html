<!-- Modal Exportar a Word -->
<dialog id="exportar-word-modal" class="modal">
  <div class="modal-box w-11/12 max-w-2xl p-0 overflow-hidden">

    <!-- Header -->
    <div class="bg-primary px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="w-8 h-8 rounded-lg bg-white flex items-center justify-center flex-shrink-0 shadow-sm">
          <i class="fas fa-file-word text-lg text-[#1c7bb0]"></i>
        </span>
        <div>
          <p class="text-[10px] font-bold text-primary-content/60 uppercase tracking-widest">Documento</p>
          <h3 class="text-sm font-bold text-primary-content">Exportar a Word</h3>
        </div>
      </div>
      <button type="button" onclick="document.getElementById('exportar-word-modal').close()"
              class="w-8 h-8 rounded-lg flex items-center justify-center text-primary-content/60 hover:bg-primary-content/10 transition-colors">
        <i class="fas fa-times text-sm"></i>
      </button>
    </div>

    <!-- Form -->
    <form id="exportar-word-form" method="POST" action="{% url 'proyectos:exportar_proyecto_word' proyecto.id %}">
      {% csrf_token %}
      <div class="px-6 py-5 flex flex-col gap-4">

        <div>
          <label class="block text-[10px] font-bold text-secondary/50 uppercase tracking-widest mb-1.5">Proyecto</label>
          <input type="text" id="export-proyecto" name="proyecto" value="{{ proyecto.nombre }}"
                 class="input input-bordered input-sm w-full" required>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-[10px] font-bold text-secondary/50 uppercase tracking-widest mb-1.5">Solicitante</label>
            <input type="text" id="export-solicitante" name="solicitante" value="{{ proyecto.solicitante }}"
                   class="input input-bordered input-sm w-full" required>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-secondary/50 uppercase tracking-widest mb-1.5">Servicio</label>
            <input type="text" id="export-servicio" name="servicio"
                   value="{% if proyecto.descripcion %}{{ proyecto.descripcion }}{% else %}{{ proyecto.ubicacion }}{% endif %}"
                   class="input input-bordered input-sm w-full" required>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[10px] font-bold text-secondary/50 uppercase tracking-widest mb-1.5">Revisión</label>
            <input type="text" id="export-rev" name="revision" value="1"
                   class="input input-bordered input-sm w-full" required>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-secondary/50 uppercase tracking-widest mb-1.5">Fecha</label>
            <input type="text" id="export-fecha" name="fecha" value="{{ proyecto.fecha_creacion|date:'d/m/Y' }}"
                   class="input input-bordered input-sm w-full" required>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-[10px] font-bold text-secondary/50 uppercase tracking-widest mb-1.5">Nro. Pliego</label>
            <input type="text" name="nro_pliego" value=""
                   class="input input-bordered input-sm w-full">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-secondary/50 uppercase tracking-widest mb-1.5">Operación</label>
            <input type="text" name="operacion" value=""
                   class="input input-bordered input-sm w-full">
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-[10px] font-bold text-secondary/50 uppercase tracking-widest mb-1.5">Usuario</label>
            <input type="text" name="usuario"
                   value="{{ request.user.get_full_name|default:request.user.username }}"
                   class="input input-bordered input-sm w-full">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-secondary/50 uppercase tracking-widest mb-1.5">Tipo de Contrato</label>
            <select name="tipo_contrato" class="select select-bordered select-sm w-full">
              <option value="CO" selected>Contrato de Obra</option>
              <option value="SPOT">SPOT</option>
              <option value="NCM">Nuevo Contrato Marco</option>
            </select>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-base-200">
        <button type="submit" class="btn btn-primary btn-sm">
          <i class="fas fa-download text-xs"></i>
          Exportar
        </button>
      </div>
    </form>

  </div>
  <form method="dialog" class="modal-backdrop"><button>Cerrar</button></form>
</dialog>

<script>
(function () {
  const form = document.getElementById('exportar-word-form');
  const modal = document.getElementById('exportar-word-modal');
  const submitBtn = form.querySelector('[type="submit"]');
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const orig = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="loading loading-spinner loading-xs"></span> Exportando...';
    try {
      const resp = await fetch(form.action, { method: 'POST', body: new FormData(form) });
      if (!resp.ok) throw new Error('Error al exportar');
      const blob = await resp.blob();
      const cd = resp.headers.get('Content-Disposition') || '';
      const match = cd.match(/filename="?([^"]+)"?/);
      const filename = match ? match[1] : 'proyecto.docx';
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      modal.close();
    } catch {
      if (window.flashy) flashy.error('Error al generar el documento.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = orig;
    }
  });
})();
</script>
