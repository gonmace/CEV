{% load main_tags %}
<dialog id="view-especificacion-modal" class="modal">
  <div class="modal-box rounded-xl border border-secondary/20 p-0 overflow-hidden max-w-4xl">
    <!-- Header -->
    <div class="flex items-start justify-between px-5 py-4 border-b border-secondary/10">
      <div class="flex-1 min-w-0 pr-4">
        <div class="flex items-center gap-2 mb-1">
          <span class="w-6 h-6 rounded-md bg-info/10 flex items-center justify-center flex-shrink-0">
            <i class="fas fa-eye text-info text-xs"></i>
          </span>
          <h3 id="view-especificacion-title" class="text-sm font-semibold text-base-content truncate"></h3>
        </div>
        <p class="text-xs text-secondary/60 pl-8">
          <span id="view-especificacion-proyecto" class="font-medium"></span>
          <span class="mx-1">·</span>
          <span id="view-especificacion-usuario"></span>
        </p>
      </div>
      <form method="dialog">
        <button class="w-7 h-7 rounded-lg flex items-center justify-center text-base-content/40 hover:bg-base-200 hover:text-base-content transition-colors flex-shrink-0">
          <i class="fas fa-times text-xs"></i>
        </button>
      </form>
    </div>

    <!-- Body -->
    <div class="px-5 py-5 max-h-[65vh] overflow-y-auto">
      <div id="view-especificacion-content" class="prose max-w-none text-sm"></div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end px-5 py-4 border-t border-secondary/10">
      <form method="dialog">
        <button class="flex items-center gap-1.5 text-xs font-semibold text-base-content/60 hover:bg-base-200 px-3 py-2 rounded-lg transition-colors">
          Cerrar
        </button>
      </form>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>Cerrar</button>
  </form>
</dialog>

<script>
  (function () {
    function openViewEspecificacionModal(button) {
      const viewModal = document.getElementById('view-especificacion-modal');
      const viewTitle = document.getElementById('view-especificacion-title');
      const viewProyecto = document.getElementById('view-especificacion-proyecto');
      const viewUsuario = document.getElementById('view-especificacion-usuario');
      const viewContent = document.getElementById('view-especificacion-content');

      if (!viewModal || !viewTitle || !viewProyecto || !viewUsuario || !viewContent) return;

      viewTitle.textContent = button.dataset.title || 'Especificación';
      viewProyecto.textContent = button.dataset.proyecto || '-';
      viewUsuario.textContent = button.dataset.usuario || '-';
      viewContent.innerHTML = button.dataset.preview || '<p class="text-base-content/60">Sin contenido.</p>';

      if (typeof viewModal.showModal === 'function') viewModal.showModal();
      else { viewModal.setAttribute('open', ''); viewModal.classList.add('modal-open'); }
    }

    function initViewEspecificacionModal() {
      document.addEventListener('click', function(event) {
        const button = event.target.closest('.view-especificacion-btn');
        if (button) {
          event.preventDefault();
          event.stopPropagation();
          openViewEspecificacionModal(button);
        }
      });
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initViewEspecificacionModal);
    else initViewEspecificacionModal();
  })();
</script>
